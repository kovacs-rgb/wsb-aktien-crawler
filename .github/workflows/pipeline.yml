name: GoldGräber Pipeline

on:
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl requests python-dotenv yfinance

      - name: Create required directories
        run: |
          mkdir -p pickle data output

      - name: Download Ticker Data
        run: python 01_download_ticker_data.py

      - name: Filter and Merge
        run: python 02_filter_and_merge.py

      - name: Create Pickle
        run: python 03_create_pickle.py

      - name: Run Reddit Crawler
        run: python 04_crawler.py

      - name: Generate Dashboard Data
        run: python 08_dashboard_data.py

      - name: Commit and Push Updated Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json data/performance_history.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen in data.json"
          else
            git commit -m "Pipeline: Dashboard-Daten aktualisiert $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
